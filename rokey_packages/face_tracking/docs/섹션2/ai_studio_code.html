<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 2-1: WHY?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; }
        .slide { width: 1280px; height: 720px; background-color: #0f172a; }
    </style>
</head>
<body class="bg-gray-200 flex items-center justify-center h-screen">
    <div class="slide shadow-2xl rounded-lg flex flex-col p-16">
        <h2 class="text-5xl font-bold text-slate-100 pb-6 border-b-4 border-sky-500">
            2.1 WHY? 왜 이 시스템이 필요한가
        </h2>
        <div class="flex-1 flex flex-col justify-center mt-8">
            <h3 class="text-3xl font-bold text-slate-100 mb-6 text-center">현행 위병소 초병 시스템의 4대 문제점</h3>
            <div class="grid grid-cols-4 gap-6 text-center">
                <div class="bg-slate-800 p-6 rounded-lg">
                    <i class="fa-solid fa-bed text-5xl text-red-400 mb-4"></i>
                    <h4 class="text-2xl font-bold text-slate-100">피로 & 집중력 저하</h4>
                    <p class="text-slate-400 mt-2">장시간 경계 근무로 인한 판단력 감소</p>
                </div>
                <div class="bg-slate-800 p-6 rounded-lg">
                    <i class="fa-solid fa-person-circle-exclamation text-5xl text-red-400 mb-4"></i>
                    <h4 class="text-2xl font-bold text-slate-100">인적 오류 위험</h4>
                    <p class="text-slate-400 mt-2">피아식별 실수, 암구호 확인 누락 가능성</p>
                </div>
                <div class="bg-slate-800 p-6 rounded-lg">
                    <i class="fa-solid fa-cloud-moon text-5xl text-yellow-400 mb-4"></i>
                    <h4 class="text-2xl font-bold text-slate-100">야간 취약</h4>
                    <p class="text-slate-400 mt-2">시야 제한 및 반응 속도 저하</p>
                </div>
                <div class="bg-slate-800 p-6 rounded-lg">
                    <i class="fa-solid fa-users-slash text-5xl text-yellow-400 mb-4"></i>
                    <h4 class="text-2xl font-bold text-slate-100">인력 부족</h4>
                    <p class="text-slate-400 mt-2">24시간 3교대 인력 운용 부담</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
