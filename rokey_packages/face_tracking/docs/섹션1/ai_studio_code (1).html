<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 1-2: WHY?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; }
        .slide { width: 1280px; height: 720px; background-color: #0f172a; }
        th, td { padding: 8px; text-align: left; border: 1px solid #334155; }
        th { background-color: #1e293b; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-200 flex items-center justify-center h-screen">
    <div class="slide shadow-2xl rounded-lg flex flex-col p-16">
        <h2 class="text-5xl font-bold text-slate-100 pb-6 border-b-4 border-sky-500">
            1.2 WHY? 왜 만들었나
        </h2>
        <div class="flex-1 grid grid-cols-2 gap-8 mt-8 text-slate-300">
            <div>
                <h3 class="text-3xl font-bold mb-4">현재 위병소 초병의 문제점</h3>
                <table class="w-full text-lg">
                    <thead>
                        <tr><th>문제</th><th>설명</th><th>심각도</th></tr>
                    </thead>
                    <tbody>
                        <tr><td>😴 <strong>피로 & 집중력 저하</strong></td><td>장시간 경계 근무로 인한 판단력 감소</td><td class="text-center text-red-400 font-bold">🔴 높음</td></tr>
                        <tr><td>⚠️ <strong>인적 오류 위험</strong></td><td>피아식별 실수, 암구호 확인 누락 가능성</td><td class="text-center text-red-400 font-bold">🔴 높음</td></tr>
                        <tr><td>🌙 <strong>야간 취약</strong></td><td>시야 제한, 반응 속도 저하</td><td class="text-center text-yellow-400 font-bold">🟡 중간</td></tr>
                        <tr><td>👥 <strong>인력 부족</strong></td><td>24시간 3교대 인력 운용 부담</td><td class="text-center text-yellow-400 font-bold">🟡 중간</td></tr>
                    </tbody>
                </table>
            </div>
            <div>
                <h3 class="text-3xl font-bold mb-4">문제점 시각화</h3>
                <div class="bg-slate-800/50 p-6 rounded-lg h-full space-y-6">
                    <div>
                        <p class="text-lg font-bold">[야간 2시]</p>
                        <div class="flex items-center justify-around mt-2 text-center">
                            <div><i class="fa-solid fa-bed text-5xl"></i><p>😴 초병 졸음</p></div>
                            <i class="fa-solid fa-arrow-right-long text-2xl"></i>
                            <div><i class="fa-solid fa-user-secret text-5xl"></i><p>👤 침입자 접근</p></div>
                            <i class="fa-solid fa-arrow-right-long text-2xl"></i>
                            <div><i class="fa-solid fa-circle-xmark text-5xl text-red-500"></i><p>❌ 감지 실패</p></div>
                        </div>
                    </div>
                    <div class="border-t border-slate-700 pt-6">
                        <p class="text-lg font-bold">[피아식별 상황]</p>
                        <div class="flex items-center justify-around mt-2 text-center">
                            <div><i class="fa-solid fa-face-tired text-5xl"></i><p>😓 피로한 초병</p></div>
                            <i class="fa-solid fa-arrow-right-long text-2xl"></i>
                            <div><i class="fa-solid fa-brain text-5xl"></i><p>🤔 판단 실수</p></div>
                            <i class="fa-solid fa-arrow-right-long text-2xl"></i>
                            <div><i class="fa-solid fa-triangle-exclamation text-5xl text-yellow-500"></i><p>⚠️ 아군 오인</p></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
