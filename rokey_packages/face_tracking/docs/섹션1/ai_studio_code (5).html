<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 1-6: Expected Effects</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; }
        .slide { width: 1280px; height: 720px; background-color: #0f172a; }
        th, td { padding: 8px; text-align: center; border: 1px solid #334155; }
        th { background-color: #1e293b; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-200 flex items-center justify-center h-screen">
    <div class="slide shadow-2xl rounded-lg flex flex-col p-16">
        <h2 class="text-5xl font-bold text-slate-100 pb-6 border-b-4 border-sky-500">
            1.6 기대 효과
        </h2>
        <div class="flex-1 grid grid-cols-2 gap-8 mt-8 text-slate-300">
            <div>
                <h3 class="text-3xl font-bold mb-4">정량적 효과</h3>
                <table class="w-full text-lg">
                    <thead>
                        <tr><th>항목</th><th>현재 (인간)</th><th>목표 (로봇)</th><th>개선율</th></tr>
                    </thead>
                    <tbody>
                        <tr><td>연속 운용 시간</td><td>2~4시간</td><td>24시간</td><td class="text-green-400 font-bold">+500%</td></tr>
                        <tr><td>피아식별 정확도</td><td>~90%</td><td>>95%</td><td class="text-green-400 font-bold">+5%p</td></tr>
                        <tr><td>반응 속도</td><td>0.5~1초</td><td>&lt;0.1초</td><td class="text-green-400 font-bold">10x</td></tr>
                        <tr><td>운용 인력</td><td>3명/1개소</td><td>1명/다개소</td><td class="text-green-400 font-bold">-66%</td></tr>
                    </tbody>
                </table>
            </div>
            <div>
                <h3 class="text-3xl font-bold mb-4">정성적 효과</h3>
                <ul class="space-y-4 text-2xl mt-10">
                    <li class="flex items-center"><i class="fa-solid fa-shield-halved text-sky-400 mr-4 w-10 text-center"></i><strong>보안 강화</strong>: 24시간 무피로 경계</li>
                    <li class="flex items-center"><i class="fa-solid fa-users-gear text-sky-400 mr-4 w-10 text-center"></i><strong>인력 효율</strong>: 병력 운용 최적화</li>
                    <li class="flex items-center"><i class="fa-solid fa-database text-sky-400 mr-4 w-10 text-center"></i><strong>기록 자동화</strong>: 모든 상황 자동 로깅</li>
                    <li class="flex items-center"><i class="fa-solid fa-network-wired text-sky-400 mr-4 w-10 text-center"></i><strong>확장성</strong>: 다개소 동시 운용 가능</li>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
