# SAM3 Grip Detection Parameters
# 노드 실행 시 이 파일을 로드하여 파라미터 설정

sam3_grip_node:
  ros__parameters:
    # SAM3 설정
    sam3_path: "~/Desktop/2day/sam3/sam3"
    hf_token: ""  # HuggingFace 토큰 (필요시 설정)
    
    # 검출 설정
    text_prompt: "gun grip"
    confidence_threshold: 0.3
    process_rate: 10.0  # Hz (높게 설정 - 실제 처리 속도에 맞춰 조절됨)
    
    # 속도 최적화 설정
    fast_mode: true
    ultra_fast: true  # 단일 프롬프트 + 이미지 리사이즈
    early_exit_score: 0.5  # 낮추면 더 빨리 반환
    
    # 깊이 설정
    min_depth: 0.1   # 최소 깊이 (m)
    max_depth: 2.0   # 최대 깊이 (m)
    voxel_size: 0.003  # 다운샘플링 복셀 크기 (m)
    
    # 그리퍼 설정 (OnRobot RG2)
    gripper_max_width: 110.0  # mm
    gripper_min_width: 0.0    # mm
    
    # 프레임 설정
    camera_frame: "camera_color_optical_frame"
    robot_base_frame: "base_link"
    
    # 토픽 설정 (RealSense 기본값)
    rgb_topic: "/camera/camera/color/image_raw"
    depth_topic: "/camera/camera/aligned_depth_to_color/image_raw"
    camera_info_topic: "/camera/camera/aligned_depth_to_color/camera_info"

grip_pose_calculator:
  ros__parameters:
    min_depth: 0.1
    max_depth: 2.0
    voxel_size: 0.003
    gripper_max_width: 110.0
    gripper_min_width: 0.0
    camera_frame: "camera_color_optical_frame"
